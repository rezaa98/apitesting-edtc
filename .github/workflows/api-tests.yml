name: API Testing CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Mengizinkan trigger manual via tombol UI GitHub

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'
        cache-dependency-path: 'package-lock.json'

    - name: Install Dependencies
      run: npm ci

    - name: Run Mocha API Tests
      env:
        # API Key diambil dari konfigurasi GitHub Secrets
        REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
      run: npm run test -- --reporter json > test-results.json

    - name: Generate PDF Report
      if: always() # Pastikan report tetap digenerate walaupun test gagal
      run: |
        node generate-report.js
        npx -y markdown-pdf -s report-style.css --paper-format A4 Test-Results.md

    - name: Upload PDF Report Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: API-Test-Report
        path: 'Test-Results.pdf'
        retention-days: 7
