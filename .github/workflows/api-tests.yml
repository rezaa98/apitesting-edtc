name: API Testing CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'
        cache-dependency-path: './API Testing/package-lock.json'

    - name: Install Dependencies
      run: npm ci
      working-directory: './API Testing'

    - name: Run Mocha API Tests
      env:
        # API Key diambil dari konfigurasi GitHub Secrets
        REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
      run: npm run test
      working-directory: './API Testing'

    - name: Generate PDF Report
      if: always() # Pastikan report tetap digenerate walaupun test gagal
      run: |
        node generate-report.js
        npx -y markdown-pdf -s report-style.css --paper-format A4 Test-Results.md
      working-directory: './API Testing'

    - name: Upload PDF Report Artifact
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: API-Test-Report
        path: './API Testing/Test-Results.pdf'
        retention-days: 7
